<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우연 — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f7f6f4; --surface: #ffffff; --surface2: #f2f1ef;
  --border: #e8e6e2; --border2: #d8d6d2;
  --text: #1a1916; --text2: #6e6b66; --text3: #a8a49e;
  --accent: #1a1916; --danger: #c0503e; --success: #4a8c5c;
  --warning: #b87c2a; --male: #4a7ab8; --female: #b84a7a;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem 1.5rem; width: 100%; max-width: 320px; }
.login-title { font-size: 18px; font-weight: 400; margin-bottom: 0.3rem; }
.login-sub { font-size: 12px; color: var(--text3); margin-bottom: 1.5rem; }
.login-input { width: 100%; padding: 11px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; outline: none; margin-bottom: 10px; }
.login-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
.login-err { font-size: 12px; color: var(--danger); margin-top: 8px; min-height: 16px; text-align: center; }
.admin { display: none; max-width: 480px; margin: 0 auto; padding: 0 1rem 4rem; }
.admin-header { padding: 1.5rem 0 1rem; display: flex; justify-content: space-between; align-items: center; }
.admin-title { font-size: 18px; font-weight: 400; }
.logout-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; }
.section { margin-bottom: 1rem; }
.section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }
.status-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; display: flex; justify-content: space-between; align-items: center; }
.status-dot-wrap { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; }
.status-dot.on { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: pulse 2s infinite; }
.status-dot.off { background: var(--text3); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.status-text { font-size: 13px; color: var(--text); }
.status-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.seat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 8px; }
.seat-title { font-size: 12px; font-weight: 500; margin-bottom: 0.7rem; display: flex; justify-content: space-between; align-items: center; }
.seat-capacity { font-size: 11px; color: var(--text3); font-weight: 400; }
.seat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.seat-input-wrap { display: flex; align-items: center; gap: 6px; }
.seat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.seat-dot.male { background: var(--male); }
.seat-dot.female { background: var(--female); }
.seat-label { font-size: 11px; color: var(--text2); flex: 1; }
.counter { display: flex; align-items: center; }
.counter-btn { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); font-size: 16px; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.counter-btn:first-child { border-radius: 6px 0 0 6px; }
.counter-btn:last-child { border-radius: 0 6px 6px 0; }
.counter-btn:hover:not(:disabled) { background: var(--border); }
.counter-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.counter-val { width: 32px; height: 28px; background: var(--bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); display: flex; align-items: center; justify-content: center; }
.seat-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.seat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.seat-bar-fill.male { background: var(--male); }
.seat-bar-fill.female { background: var(--female); }
.seat-ratio { font-size: 11px; color: var(--text3); margin-top: 4px; }
.seat-remain { font-size: 11px; margin-top: 3px; font-weight: 500; }
.seat-remain.ok { color: var(--success); }
.seat-remain.warn { color: var(--warning); }
.seat-remain.full { color: var(--danger); }

/* Waiting list */
.waiting-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.waiting-empty { padding: 2rem; text-align: center; font-size: 13px; color: var(--text3); }
.waiting-item { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.waiting-item:last-child { border-bottom: none; }
.waiting-item.priority-free { background: #fffbf0; }
.waiting-item.priority-star { background: #f8f8ff; }
.star-btn { background: none; border: none; font-size: 16px; cursor: pointer; flex-shrink: 0; line-height: 1; padding: 2px; color: var(--border2); transition: color 0.15s; }
.star-btn.active { color: #f0b429; }
.waiting-num { font-size: 11px; color: var(--text3); min-width: 18px; flex-shrink: 0; }
.waiting-info { flex: 1; min-width: 0; }
.waiting-name-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.waiting-name { font-size: 13px; font-weight: 500; }
.waiting-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.gender-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
.gender-badge.male { background: #eef3fb; color: var(--male); }
.gender-badge.female { background: #fbeef5; color: var(--female); }
.seat-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500; flex-shrink: 0; }
.seat-badge.table { background: #eef3fb; color: #2a5fa8; }
.seat-badge.bar { background: #eef6f1; color: #2a7a4a; }
.seat-badge.free { background: #fdf6e0; color: #8a6020; }
.waiting-actions { display: flex; gap: 5px; flex-shrink: 0; }
.action-btn { padding: 5px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }
.action-btn:hover { border-color: var(--border2); }
.action-btn.call { background: #eef6f1; border-color: #c8e0d0; color: var(--success); }
.action-btn.enter { background: var(--accent); border-color: var(--accent); color: #fff; }
.action-btn.enter:hover { background: #3a3834; }

.next-banner { background: #fffbf0; border: 1px solid #e8d89a; border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 8px; display: none; }
.next-label { font-size: 10px; color: var(--warning); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.next-name { font-size: 15px; font-weight: 500; }
.next-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.stat-mini { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; }
.stat-mini-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.stat-mini-val { font-size: 26px; font-weight: 300; color: var(--text); line-height: 1; }
.stat-mini-unit { font-size: 11px; color: var(--text3); margin-top: 3px; }
.refresh-row { display: flex; justify-content: center; margin-top: 1rem; }
.refresh-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 6px 12px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.dot { display: inline-block; animation: blink 1.2s ease-in-out infinite; color: var(--text3); font-size: 22px; line-height: 1; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <p class="login-title">관리자 로그인</p>
    <p class="login-sub">혼술바 우연 을지로</p>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<div class="admin" id="adminWrap">
  <div class="admin-header">
    <p class="admin-title">관리자</p>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="section">
    <div class="stats-row">
      <div class="stat-mini">
        <p class="stat-mini-label">전체 대기</p>
        <p class="stat-mini-val" id="totalCount"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></p>
        <p class="stat-mini-unit">팀</p>
      </div>
      <div class="stat-mini">
        <p class="stat-mini-label">대기 인원</p>
        <p class="stat-mini-val" id="totalPeople"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></p>
        <p class="stat-mini-unit">명</p>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-label">운영 상태</p>
    <div class="status-card">
      <div class="status-dot-wrap">
        <div class="status-dot off" id="fullDot"></div>
        <div>
          <p class="status-text" id="fullStatusText">웨이팅 불가</p>
          <p class="status-sub" id="fullStatusSub">테이블이 꽉 차면 자동으로 켜져요</p>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-label">현재 매장 현황</p>
    <div class="seat-card">
      <div class="seat-title">테이블석 <span class="seat-capacity">최대 26명</span></div>
      <div class="seat-row">
        <div class="seat-input-wrap">
          <div class="seat-dot male"></div>
          <span class="seat-label">남성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('tM',-1)">−</button>
            <div class="counter-val" id="tM">0</div>
            <button class="counter-btn" id="tMPlus" onclick="updateSeat('tM',1)">+</button>
          </div>
        </div>
        <div class="seat-input-wrap">
          <div class="seat-dot female"></div>
          <span class="seat-label">여성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('tF',-1)">−</button>
            <div class="counter-val" id="tF">0</div>
            <button class="counter-btn" id="tFPlus" onclick="updateSeat('tF',1)">+</button>
          </div>
        </div>
      </div>
      <div class="seat-bar"><div class="seat-bar-fill male" id="tMBar" style="width:0%"></div></div>
      <div class="seat-bar" style="margin-top:3px"><div class="seat-bar-fill female" id="tFBar" style="width:0%"></div></div>
      <p class="seat-ratio" id="tRatio">남 0 / 여 0 / 총 0명</p>
      <p class="seat-remain ok" id="tRemain">남은 자리 26명</p>
    </div>
    <div class="seat-card">
      <div class="seat-title">바석 <span class="seat-capacity">최대 6명</span></div>
      <div class="seat-row">
        <div class="seat-input-wrap">
          <div class="seat-dot male"></div>
          <span class="seat-label">남성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('bM',-1)">−</button>
            <div class="counter-val" id="bM">0</div>
            <button class="counter-btn" id="bMPlus" onclick="updateSeat('bM',1)">+</button>
          </div>
        </div>
        <div class="seat-input-wrap">
          <div class="seat-dot female"></div>
          <span class="seat-label">여성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('bF',-1)">−</button>
            <div class="counter-val" id="bF">0</div>
            <button class="counter-btn" id="bFPlus" onclick="updateSeat('bF',1)">+</button>
          </div>
        </div>
      </div>
      <div class="seat-bar"><div class="seat-bar-fill male" id="bMBar" style="width:0%"></div></div>
      <div class="seat-bar" style="margin-top:3px"><div class="seat-bar-fill female" id="bFBar" style="width:0%"></div></div>
      <p class="seat-ratio" id="bRatio">남 0 / 여 0 / 총 0명</p>
    </div>
  </div>

  <div class="next-banner" id="nextBanner">
    <p class="next-label">다음 입장 추천</p>
    <p class="next-name" id="nextName">—</p>
    <p class="next-meta" id="nextMeta">—</p>
  </div>

  <div class="section">
    <p class="section-label">대기 목록</p>
    <div class="waiting-card" id="waitingList">
      <div class="waiting-empty">불러오는 중...</div>
    </div>
  </div>

  <div class="refresh-row">
    <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>
</div>

<script>
const SHEET_ID = '1NmPb6wxX0usqeP-gd7cFQPgHecLQsCYcA3i3wcU3uwc';
const API_KEY = 'AIzaSyDNs6DjFlPRHukWl572r1pMZV72F6ZtODI';
const RANGE = '시트1!A:H';
const ADMIN_PW = '1234';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvIfxTPJVZUfjED-3XwLcHKRfbHouWLVFh9grynew8FdjUavr5nikX5wJMDdcYf1vH/exec';
const TABLE_MAX = 26;
const BAR_MAX = 6;

// 우선순위: 프리패스(0) > 별표(1) > 바(2) > 테이블(3)
function getSeatPriority(seat) {
  if (seat === '프리패스') return 0;
  if (seat === '바자리') return 2;
  return 3; // 테이블석 기본
}

let allRows = [];
let rawRows = []; // 원본 인덱스 보존용
let starred = JSON.parse(localStorage.getItem('starred') || '[]'); // 원본 인덱스 기준
let seats = JSON.parse(localStorage.getItem('seats') || '{"tM":0,"tF":0,"bM":0,"bF":0}');
let isFull = false;

function doLogin() {
  if (document.getElementById('pwInput').value === ADMIN_PW) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('loginErr').textContent = '비밀번호가 틀렸어요.';
  }
}
function doLogout() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

function initAdmin() {
  ['tM','tF','bM','bF'].forEach(k => { document.getElementById(k).textContent = seats[k] || 0; });
  updateSeatUI('t', TABLE_MAX);
  updateSeatUI('b', BAR_MAX);
  loadData();
  setInterval(loadData, 30000);
}

function updateSeat(id, delta) {
  const prefix = id[0];
  const max = prefix === 't' ? TABLE_MAX : BAR_MAX;
  const m = parseInt(document.getElementById(prefix+'M').textContent)||0;
  const f = parseInt(document.getElementById(prefix+'F').textContent)||0;
  if (delta > 0 && m + f >= max) return;
  const el = document.getElementById(id);
  let val = parseInt(el.textContent) + delta;
  if (val < 0) val = 0;
  el.textContent = val;
  seats[id] = val;
  localStorage.setItem('seats', JSON.stringify(seats));
  updateSeatUI(prefix, max);
  updateNextRecommend();
  if (prefix === 't') {
    const tTotal = (parseInt(seats.tM)||0) + (parseInt(seats.tF)||0);
    const remain = Math.max(TABLE_MAX - tTotal, 0);
    const newFull = tTotal >= TABLE_MAX;
    if (newFull !== isFull) {
      isFull = newFull;
      updateFullStatusUI();
      fetch(GAS_URL + '?type=setFull&value=' + isFull);
    }
    fetch(GAS_URL + '?type=setSeats&value=' + remain);
  }
}

function updateSeatUI(prefix, max) {
  const m = parseInt(document.getElementById(prefix+'M').textContent)||0;
  const f = parseInt(document.getElementById(prefix+'F').textContent)||0;
  const total = m + f;
  const remain = Math.max(max - total, 0);
  document.getElementById(prefix+'MBar').style.width = Math.min(m/max*100,100) + '%';
  document.getElementById(prefix+'FBar').style.width = Math.min(f/max*100,100) + '%';
  document.getElementById(prefix+'Ratio').textContent = '남 ' + m + ' / 여 ' + f + ' / 총 ' + total + '명';
  const mPlus = document.getElementById(prefix+'MPlus');
  const fPlus = document.getElementById(prefix+'FPlus');
  if (mPlus) mPlus.disabled = total >= max;
  if (fPlus) fPlus.disabled = total >= max;
  if (prefix === 't') {
    const remainEl = document.getElementById('tRemain');
    if (remain === 0) { remainEl.textContent = '만석!'; remainEl.className = 'seat-remain full'; }
    else if (remain <= 3) { remainEl.textContent = '남은 자리 ' + remain + '명'; remainEl.className = 'seat-remain warn'; }
    else { remainEl.textContent = '남은 자리 ' + remain + '명'; remainEl.className = 'seat-remain ok'; }
  }
}

function updateFullStatusUI() {
  const dot = document.getElementById('fullDot');
  const text = document.getElementById('fullStatusText');
  const sub = document.getElementById('fullStatusSub');
  if (isFull) {
    dot.className = 'status-dot on';
    text.textContent = '만석 — 웨이팅 등록 가능';
    text.style.color = 'var(--danger)';
    sub.textContent = '테이블 26명 꽉 찼어요';
  } else {
    dot.className = 'status-dot off';
    text.textContent = '웨이팅 불가';
    text.style.color = 'var(--text)';
    sub.textContent = '테이블이 꽉 차면 자동으로 켜져요';
  }
}

function toggleStar(rawIdx) {
  const i = starred.indexOf(rawIdx);
  if (i >= 0) starred.splice(i, 1); else starred.push(rawIdx);
  localStorage.setItem('starred', JSON.stringify(starred));
  sortAndRender();
  updateNextRecommend();
}

function callGuest(phone) {
  window.location.href = 'tel:' + phone.replace(/[^0-9]/g, '');
}

function updateNextRecommend() {
  if (!allRows.length) { document.getElementById('nextBanner').style.display = 'none'; return; }
  // 우선순위 1위 = 프리패스
  const freePass = allRows.find(r => (r.row[7]||'') === '프리패스');
  if (freePass) { showNextBanner(freePass.row, '프리패스'); return; }
  // 우선순위 2위 = 별표
  const starredRow = allRows.find(r => starred.includes(r.rawIdx));
  if (starredRow) { showNextBanner(starredRow.row, '★ 우선순번'); return; }
  // 우선순위 3위 = 성비 기반
  const tM = parseInt(document.getElementById('tM').textContent)||0;
  const tF = parseInt(document.getElementById('tF').textContent)||0;
  const bM = parseInt(document.getElementById('bM').textContent)||0;
  const bF = parseInt(document.getElementById('bF').textContent)||0;
  const needMale = (tM+bM) <= (tF+bF);
  const rec = allRows.find(r => needMale ? r.row[4]==='남성' : r.row[4]==='여성') || allRows[0];
  showNextBanner(rec.row, needMale ? '남성 부족' : '여성 부족');
}

function showNextBanner(row, reason) {
  document.getElementById('nextBanner').style.display = 'block';
  document.getElementById('nextName').textContent = (row[3]||'—') + ' (' + (row[4]||'—') + ', ' + (row[5]||'—') + '명)';
  document.getElementById('nextMeta').textContent = (row[6]||'') + ' · ' + reason;
}

async function enterGuest(rawIdx) {
  if (!confirm('입장 처리하시겠어요?')) return;
  const item = allRows.find(r => r.rawIdx === rawIdx);
  if (!item) return;
  const row = item.row;
  try {
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type: 'delete', name: row[3], phone: row[6] })
    });
  } catch(e) {}
  starred = starred.filter(i => i !== rawIdx);
  localStorage.setItem('starred', JSON.stringify(starred));
  await loadData();
}

function sendSMS(row) {
  const name = row[3]||'';
  const phone = row[6]||'';
  const msg = '[혼술바 우연] ' + name + '님, 곧 입장 가능합니다! 5분 내로 오시지 않으면 다음 순번으로 넘어가요 :)';
  if (confirm(name + '님에게 문자를 발송할까요?\n\n' + msg)) {
    alert('알리고 API 연동 후 자동 발송 가능합니다.\n번호: ' + phone);
  }
}

function getSeatBadge(seat) {
  if (seat === '바자리') return '<span class="seat-badge bar">바</span>';
  if (seat === '프리패스') return '<span class="seat-badge free">프</span>';
  return '<span class="seat-badge table">테</span>';
}

async function loadData() {
  try {
    const res = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(RANGE) + '?key=' + API_KEY);
    const data = await res.json();
    if (data.error) return;
    rawRows = (data.values||[]).slice(1).filter(r => r[3] && r[3].toString().trim() !== '');
    sortAndRender();
    updateStats();
    updateNextRecommend();
  } catch(e) {}
}

function sortAndRender() {
  // 우선순위 정렬: 프리패스(0) > 별표(1) > 바(2) > 테이블(3), 같으면 등록순
  allRows = rawRows.map((row, rawIdx) => ({ row, rawIdx })).sort((a, b) => {
    const aSeat = a.row[7] || '테이블석';
    const bSeat = b.row[7] || '테이블석';
    const aStarred = starred.includes(a.rawIdx);
    const bStarred = starred.includes(b.rawIdx);

    // 프리패스 최우선
    if (aSeat === '프리패스' && bSeat !== '프리패스') return -1;
    if (bSeat === '프리패스' && aSeat !== '프리패스') return 1;

    // 별표 다음
    if (aStarred && !bStarred) return -1;
    if (bStarred && !aStarred) return 1;

    // 바 > 테이블
    if (aSeat === '바자리' && bSeat !== '바자리') return -1;
    if (bSeat === '바자리' && aSeat !== '바자리') return 1;

    // 같으면 등록순
    return a.rawIdx - b.rawIdx;
  });
  renderList();
}

function updateStats() {
  document.getElementById('totalCount').textContent = rawRows.length;
  document.getElementById('totalPeople').textContent = rawRows.reduce((s,r) => s+(parseInt(r[5])||0), 0);
}

function renderList() {
  const el = document.getElementById('waitingList');
  if (!allRows.length) {
    el.innerHTML = '<div class="waiting-empty">현재 대기 없음</div>';
    document.getElementById('nextBanner').style.display = 'none';
    return;
  }
  el.innerHTML = allRows.map(({row, rawIdx}, displayIdx) => {
    const isStarred = starred.includes(rawIdx);
    const gender = row[4]||'';
    const gClass = gender==='남성' ? 'male' : 'female';
    const seat = row[7] || '테이블석';
    const timeStr = row[2] || '';
    const datepart = timeStr.substring(5,10).replace('-','/');
    const timepart = timeStr.substring(11,16);
    const time = timeStr ? datepart + ' ' + timepart : '';
    const priorityClass = seat === '프리패스' ? 'priority-free' : isStarred ? 'priority-star' : '';
    return `<div class="waiting-item ${priorityClass}">
      <button class="star-btn ${isStarred?'active':''}" onclick="toggleStar(${rawIdx})">★</button>
      <span class="waiting-num">${displayIdx+1}</span>
      <div class="waiting-info">
        <div class="waiting-name-row">
          <span class="waiting-name">${row[3]||'—'}</span>
          <span class="gender-badge ${gClass}">${gender}</span>
          ${getSeatBadge(seat)}
        </div>
        <p class="waiting-meta">${row[5]||'—'}명 · ${time}</p>
      </div>
      <div class="waiting-actions">
        <button class="action-btn" onclick="sendSMS(rawRows[${rawIdx}])">문자</button>
        <button class="action-btn call" onclick="callGuest('${row[6]||''}')">전화</button>
        <button class="action-btn enter" onclick="enterGuest(${rawIdx})">입장</button>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
