<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우연 — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f7f6f4;
  --surface: #ffffff;
  --surface2: #f2f1ef;
  --border: #e8e6e2;
  --border2: #d8d6d2;
  --text: #1a1916;
  --text2: #6e6b66;
  --text3: #a8a49e;
  --accent: #1a1916;
  --danger: #c0503e;
  --success: #4a8c5c;
  --warning: #b87c2a;
  --male: #4a7ab8;
  --female: #b84a7a;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Login */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem 1.5rem; width: 100%; max-width: 320px; }
.login-title { font-size: 18px; font-weight: 400; margin-bottom: 0.3rem; }
.login-sub { font-size: 12px; color: var(--text3); margin-bottom: 1.5rem; }
.login-input { width: 100%; padding: 11px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; outline: none; margin-bottom: 10px; }
.login-input:focus { border-color: var(--border2); }
.login-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
.login-err { font-size: 12px; color: var(--danger); margin-top: 8px; min-height: 16px; text-align: center; }

/* Admin layout */
.admin { display: none; max-width: 480px; margin: 0 auto; padding: 0 1rem 4rem; }
.admin-header { padding: 1.5rem 0 1rem; display: flex; justify-content: space-between; align-items: center; }
.admin-title { font-size: 18px; font-weight: 400; }
.logout-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px 8px; }

/* Section */
.section { margin-bottom: 1rem; }
.section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }

/* Toggle */
.toggle-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; display: flex; justify-content: space-between; align-items: center; }
.toggle-info { font-size: 13px; color: var(--text); }
.toggle-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border2); border-radius: 24px; cursor: pointer; transition: 0.2s; }
.toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .toggle-slider { background: var(--danger); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

/* Seat input */
.seat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 8px; }
.seat-title { font-size: 12px; font-weight: 500; margin-bottom: 0.7rem; display: flex; justify-content: space-between; align-items: center; }
.seat-capacity { font-size: 11px; color: var(--text3); font-weight: 400; }
.seat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.seat-input-wrap { display: flex; align-items: center; gap: 6px; }
.seat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.seat-dot.male { background: var(--male); }
.seat-dot.female { background: var(--female); }
.seat-label { font-size: 11px; color: var(--text2); flex: 1; }
.counter { display: flex; align-items: center; gap: 0; }
.counter-btn { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); font-size: 16px; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
.counter-btn:first-child { border-radius: 6px 0 0 6px; }
.counter-btn:last-child { border-radius: 0 6px 6px 0; }
.counter-btn:hover { background: var(--border); }
.counter-val { width: 32px; height: 28px; background: var(--bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans KR', sans-serif; }
.seat-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.seat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.seat-bar-fill.male { background: var(--male); }
.seat-bar-fill.female { background: var(--female); }
.seat-ratio { font-size: 11px; color: var(--text3); margin-top: 4px; }
.seat-warn { font-size: 11px; color: var(--danger); margin-top: 4px; display: none; }

/* Waiting list */
.waiting-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.waiting-empty { padding: 2rem; text-align: center; font-size: 13px; color: var(--text3); }
.waiting-item { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; transition: background 0.1s; }
.waiting-item:last-child { border-bottom: none; }
.waiting-item.priority { background: #fffbf0; }
.waiting-item.priority .waiting-num { color: var(--warning); }
.star-btn { background: none; border: none; font-size: 18px; cursor: pointer; flex-shrink: 0; line-height: 1; padding: 2px; color: var(--border2); transition: color 0.15s; }
.star-btn.active { color: #f0b429; }
.waiting-num { font-size: 11px; color: var(--text3); min-width: 20px; }
.waiting-info { flex: 1; min-width: 0; }
.waiting-name { font-size: 13px; font-weight: 500; color: var(--text); }
.waiting-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.waiting-gender { font-size: 11px; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
.waiting-gender.male { background: #eef3fb; color: var(--male); }
.waiting-gender.female { background: #fbeef5; color: var(--female); }
.waiting-actions { display: flex; gap: 6px; flex-shrink: 0; }
.sms-btn { padding: 5px 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; color: var(--text2); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
.sms-btn:hover { border-color: var(--border2); }
.enter-btn { padding: 5px 9px; background: var(--accent); border: none; border-radius: 6px; font-size: 11px; color: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
.enter-btn:hover { background: #3a3834; }

/* Next up banner */
.next-banner { background: #fffbf0; border: 1px solid #e8d89a; border-radius: 10px; padding: 0.9rem 1rem; margin-bottom: 8px; display: none; }
.next-label { font-size: 10px; color: var(--warning); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.next-name { font-size: 15px; font-weight: 500; color: var(--text); }
.next-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Stats bar */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.stat-mini { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; }
.stat-mini-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.stat-mini-val { font-size: 26px; font-weight: 300; color: var(--text); line-height: 1; }
.stat-mini-unit { font-size: 11px; color: var(--text3); margin-top: 3px; }

.refresh-row { display: flex; justify-content: center; margin-top: 1rem; }
.refresh-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 6px 12px; }

/* Loading dots */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.dot { display: inline-block; animation: blink 1.2s ease-in-out infinite; color: var(--text3); font-size: 22px; line-height: 1; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <p class="login-title">관리자 로그인</p>
    <p class="login-sub">혼술바 우연 을지로</p>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- Admin -->
<div class="admin" id="adminWrap">
  <div class="admin-header">
    <p class="admin-title">관리자</p>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="stats-row">
      <div class="stat-mini">
        <p class="stat-mini-label">전체 대기</p>
        <p class="stat-mini-val" id="totalCount"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></p>
        <p class="stat-mini-unit">팀</p>
      </div>
      <div class="stat-mini">
        <p class="stat-mini-label">대기 인원</p>
        <p class="stat-mini-val" id="totalPeople"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></p>
        <p class="stat-mini-unit">명</p>
      </div>
    </div>
  </div>

  <!-- 만석 토글 -->
  <div class="section">
    <p class="section-label">운영 상태</p>
    <div class="toggle-card">
      <div>
        <p class="toggle-info">만석</p>
        <p class="toggle-sub" id="fullToggleSub">현재 웨이팅 등록 가능</p>
      </div>
      <label class="toggle">
        <input type="checkbox" id="fullToggle" onchange="toggleFull()">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- 테이블석 -->
  <div class="section">
    <p class="section-label">현재 매장 현황</p>
    <div class="seat-card">
      <div class="seat-title">
        테이블석
        <span class="seat-capacity">최대 26명</span>
      </div>
      <div class="seat-row">
        <div class="seat-input-wrap">
          <div class="seat-dot male"></div>
          <span class="seat-label">남성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('tM',-1)">−</button>
            <div class="counter-val" id="tM">0</div>
            <button class="counter-btn" onclick="updateSeat('tM',1)">+</button>
          </div>
        </div>
        <div class="seat-input-wrap">
          <div class="seat-dot female"></div>
          <span class="seat-label">여성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('tF',-1)">−</button>
            <div class="counter-val" id="tF">0</div>
            <button class="counter-btn" onclick="updateSeat('tF',1)">+</button>
          </div>
        </div>
      </div>
      <div class="seat-bar">
        <div class="seat-bar-fill male" id="tMBar" style="width:0%"></div>
      </div>
      <div class="seat-bar" style="margin-top:3px">
        <div class="seat-bar-fill female" id="tFBar" style="width:0%"></div>
      </div>
      <p class="seat-ratio" id="tRatio">남 0 / 여 0 / 총 0명</p>
      <p class="seat-warn" id="tWarn">⚠️ 최대 인원 초과!</p>
    </div>

    <!-- 바석 -->
    <div class="seat-card">
      <div class="seat-title">
        바석
        <span class="seat-capacity">최대 6명</span>
      </div>
      <div class="seat-row">
        <div class="seat-input-wrap">
          <div class="seat-dot male"></div>
          <span class="seat-label">남성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('bM',-1)">−</button>
            <div class="counter-val" id="bM">0</div>
            <button class="counter-btn" onclick="updateSeat('bM',1)">+</button>
          </div>
        </div>
        <div class="seat-input-wrap">
          <div class="seat-dot female"></div>
          <span class="seat-label">여성</span>
          <div class="counter">
            <button class="counter-btn" onclick="updateSeat('bF',-1)">−</button>
            <div class="counter-val" id="bF">0</div>
            <button class="counter-btn" onclick="updateSeat('bF',1)">+</button>
          </div>
        </div>
      </div>
      <div class="seat-bar">
        <div class="seat-bar-fill male" id="bMBar" style="width:0%"></div>
      </div>
      <div class="seat-bar" style="margin-top:3px">
        <div class="seat-bar-fill female" id="bFBar" style="width:0%"></div>
      </div>
      <p class="seat-ratio" id="bRatio">남 0 / 여 0 / 총 0명</p>
      <p class="seat-warn" id="bWarn">⚠️ 최대 인원 초과!</p>
    </div>
  </div>

  <!-- 다음 추천 -->
  <div class="next-banner" id="nextBanner">
    <p class="next-label">다음 입장 추천</p>
    <p class="next-name" id="nextName">—</p>
    <p class="next-meta" id="nextMeta">—</p>
  </div>

  <!-- 대기 목록 -->
  <div class="section">
    <p class="section-label">대기 목록</p>
    <div class="waiting-card" id="waitingList">
      <div class="waiting-empty">불러오는 중...</div>
    </div>
  </div>

  <div class="refresh-row">
    <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>
</div>

<script>
const SHEET_ID = '1NmPb6wxX0usqeP-gd7cFQPgHecLQsCYcA3i3wcU3uwc';
const API_KEY = 'AIzaSyDNs6DjFlPRHukWl572r1pMZV72F6ZtODI';
const RANGE = '시트1!A:G';
const ADMIN_PW = '1234'; // 비밀번호 여기서 변경!
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvIfxTPJVZUfjED-3XwLcHKRfbHouWLVFh9grynew8FdjUavr5nikX5wJMDdcYf1vH/exec';

let allRows = [];
let starred = JSON.parse(localStorage.getItem('starred') || '[]');
let seats = JSON.parse(localStorage.getItem('seats') || '{"tM":0,"tF":0,"bM":0,"bF":0}');
let isFull = localStorage.getItem('isFull') === 'true';

// Login
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('loginErr').textContent = '비밀번호가 틀렸어요.';
  }
}
function doLogout() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

function initAdmin() {
  // 저장된 값 복원
  ['tM','tF','bM','bF'].forEach(k => {
    document.getElementById(k).textContent = seats[k] || 0;
  });
  updateSeatUI('t', 26);
  updateSeatUI('b', 6);
  document.getElementById('fullToggle').checked = isFull;
  updateFullToggleUI();
  loadData();
  setInterval(loadData, 30000);
}

// 만석 토글
function toggleFull() {
  isFull = document.getElementById('fullToggle').checked;
  localStorage.setItem('isFull', isFull);
  updateFullToggleUI();
  // GAS로 만석 상태 전송
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ type: 'full', isFull })
  });
}
function updateFullToggleUI() {
  const sub = document.getElementById('fullToggleSub');
  sub.textContent = isFull ? '현재 웨이팅 등록 차단 중' : '현재 웨이팅 등록 가능';
  sub.style.color = isFull ? 'var(--danger)' : 'var(--text3)';
}

// 좌석 카운터
function updateSeat(id, delta) {
  const el = document.getElementById(id);
  let val = parseInt(el.textContent) + delta;
  if (val < 0) val = 0;
  el.textContent = val;
  seats[id] = val;
  localStorage.setItem('seats', JSON.stringify(seats));
  const prefix = id[0]; // t or b
  const max = prefix === 't' ? 26 : 6;
  updateSeatUI(prefix, max);
  updateNextRecommend();
}

function updateSeatUI(prefix, max) {
  const m = parseInt(document.getElementById(prefix+'M').textContent) || 0;
  const f = parseInt(document.getElementById(prefix+'F').textContent) || 0;
  const total = m + f;
  document.getElementById(prefix+'MBar').style.width = Math.min(m/max*100, 100) + '%';
  document.getElementById(prefix+'FBar').style.width = Math.min(f/max*100, 100) + '%';
  document.getElementById(prefix+'Ratio').textContent = '남 ' + m + ' / 여 ' + f + ' / 총 ' + total + '명';
  const warn = document.getElementById(prefix+'Warn');
  warn.style.display = total > max ? 'block' : 'none';
}

// 별표 (우선순번)
function toggleStar(idx) {
  const i = starred.indexOf(idx);
  if (i >= 0) starred.splice(i, 1);
  else starred.push(idx);
  localStorage.setItem('starred', JSON.stringify(starred));
  renderList();
  updateNextRecommend();
}

// 다음 추천
function updateNextRecommend() {
  if (!allRows.length) return;
  const tM = parseInt(document.getElementById('tM').textContent) || 0;
  const tF = parseInt(document.getElementById('tF').textContent) || 0;
  const bM = parseInt(document.getElementById('bM').textContent) || 0;
  const bF = parseInt(document.getElementById('bF').textContent) || 0;
  const totalM = tM + bM;
  const totalF = tF + bF;

  // 별표된 사람 있으면 최우선
  const starredRows = allRows.filter((r, i) => starred.includes(i));
  if (starredRows.length > 0) {
    const r = starredRows[0];
    showNextBanner(r, '★ 우선순번');
    return;
  }

  // 성비 기반 추천
  const needMale = totalM <= totalF;
  const recommended = allRows.find(r => {
    const g = r[4] || '';
    return needMale ? g === '남성' : g === '여성';
  }) || allRows[0];

  const reason = needMale ? '남성 부족' : '여성 부족';
  showNextBanner(recommended, reason);
}

function showNextBanner(row, reason) {
  const banner = document.getElementById('nextBanner');
  banner.style.display = 'block';
  document.getElementById('nextName').textContent = (row[3] || '—') + ' (' + (row[4] || '—') + ', ' + (row[5] || '—') + '명)';
  document.getElementById('nextMeta').textContent = row[6] || '' + ' · ' + reason;
}

// 입장 처리
async function enterGuest(rowIndex) {
  if (!confirm('입장 처리하시겠어요?')) return;
  const row = allRows[rowIndex];
  // 성별에 따라 좌석 자동 반영 안내만 (직접 조정하도록)
  allRows.splice(rowIndex, 1);
  // starred 인덱스 재조정
  starred = starred.map(i => i > rowIndex ? i - 1 : i).filter(i => i !== rowIndex);
  localStorage.setItem('starred', JSON.stringify(starred));

  // GAS로 삭제 요청
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ type: 'delete', name: row[3], phone: row[6] })
  });

  renderList();
  updateStats();
  updateNextRecommend();
}

// 문자 발송
function sendSMS(row) {
  const phone = row[6] || '';
  const name = row[3] || '';
  const msg = '[혼술바 우연] ' + name + '님, 곧 입장 가능합니다! 5분 내로 오시지 않으면 다음 순번으로 넘어가요 :)';
  // SMS는 tel: 링크로 안내 (실제 발송은 알리고 연동 시)
  if (confirm(name + '님에게 문자를 발송할까요?\n\n' + msg)) {
    alert('문자 발송 기능은 알리고 API 연동 후 사용 가능합니다.\n번호: ' + phone);
  }
}

async function loadData() {
  try {
    const res = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(RANGE) + '?key=' + API_KEY);
    const data = await res.json();
    if (data.error) return;
    allRows = (data.values || []).slice(1).filter(r => r[3]);
    renderList();
    updateStats();
    updateNextRecommend();
  } catch(e) {}
}

function updateStats() {
  document.getElementById('totalCount').textContent = allRows.length;
  const totalPeople = allRows.reduce((sum, r) => sum + (parseInt(r[5]) || 0), 0);
  document.getElementById('totalPeople').textContent = totalPeople;
}

function renderList() {
  const el = document.getElementById('waitingList');
  if (!allRows.length) {
    el.innerHTML = '<div class="waiting-empty">현재 대기 없음</div>';
    document.getElementById('nextBanner').style.display = 'none';
    return;
  }

  el.innerHTML = allRows.map((row, i) => {
    const isStarred = starred.includes(i);
    const gender = row[4] || '';
    const gClass = gender === '남성' ? 'male' : gender === '여성' ? 'female' : '';
    const time = row[2] ? row[2].substring(11, 16) : '';
    return `
      <div class="waiting-item ${isStarred ? 'priority' : ''}">
        <button class="star-btn ${isStarred ? 'active' : ''}" onclick="toggleStar(${i})">★</button>
        <span class="waiting-num">${i+1}</span>
        <div class="waiting-info">
          <p class="waiting-name">${row[3] || '—'}</p>
          <p class="waiting-meta">${row[5] || '—'}명 · ${row[6] || '—'} · ${time}</p>
        </div>
        <span class="waiting-gender ${gClass}">${gender}</span>
        <div class="waiting-actions">
          <button class="sms-btn" onclick="sendSMS(allRows[${i}])">문자</button>
          <button class="enter-btn" onclick="enterGuest(${i})">입장</button>
        </div>
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
